<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code Hooks Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      padding: 24px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 20px; color: #c9a0ff; }
    h2 { font-size: 1.1rem; margin-bottom: 12px; color: #8b949e; }
    .container { max-width: 1000px; margin: 0 auto; }
    .sessions-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
    .session-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 14px 18px;
      cursor: pointer;
      transition: border-color 0.15s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .session-card:hover { border-color: #c9a0ff; }
    .session-card.active { border-color: #c9a0ff; background: #1c2230; }
    .session-id { font-family: monospace; font-size: 0.85rem; color: #c9a0ff; }
    .session-meta { font-size: 0.8rem; color: #8b949e; }
    .session-meta span { margin-right: 14px; }
    .badge {
      background: #30363d;
      color: #e1e4e8;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.75rem;
    }
    .events-panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 18px;
    }
    .event-row {
      display: grid;
      grid-template-columns: 140px 110px 1fr;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid #21262d;
      font-size: 0.85rem;
      align-items: start;
    }
    .event-row:last-child { border-bottom: none; }
    .event-time { color: #8b949e; font-family: monospace; font-size: 0.78rem; }
    .event-type { font-weight: 600; }
    .event-type.PreToolUse { color: #ffa657; }
    .event-type.PostToolUse { color: #7ee787; }
    .event-type.SessionStart { color: #79c0ff; }
    .event-type.SessionEnd { color: #f85149; }
    .event-type.Stop { color: #d2a8ff; }
    .event-detail {
      color: #8b949e;
      font-family: monospace;
      font-size: 0.78rem;
      word-break: break-all;
      max-height: 80px;
      overflow: hidden;
    }
    .empty-state {
      text-align: center;
      color: #484f58;
      padding: 40px;
      font-size: 0.9rem;
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .refresh-indicator {
      font-size: 0.75rem;
      color: #484f58;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="status-bar">
      <h1>Claude Code Hooks Dashboard</h1>
      <span class="refresh-indicator" id="refresh-indicator">Auto-refresh: 5s</span>
    </div>

    <h2>Recent Sessions</h2>
    <div class="sessions-list" id="sessions-list">
      <div class="empty-state">No sessions yet. Configure hooks to start monitoring.</div>
    </div>

    <div id="events-panel" style="display:none;">
      <h2>Events for <span id="selected-session-id" class="session-id"></span></h2>
      <div class="events-panel" id="events-list"></div>
    </div>
  </div>

  <script>
    let selectedSessionId = null;

    async function loadSessions() {
      try {
        const res = await fetch('/api/sessions');
        const sessions = await res.json();
        const container = document.getElementById('sessions-list');

        if (sessions.length === 0) {
          container.innerHTML = '<div class="empty-state">No sessions yet. Configure hooks to start monitoring.</div>';
          return;
        }

        container.innerHTML = sessions.map(s => {
          const started = new Date(s.started_at + 'Z').toLocaleString();
          const status = s.ended_at ? 'ended' : 'active';
          return `
            <div class="session-card ${s.id === selectedSessionId ? 'active' : ''}"
                 onclick="selectSession('${s.id}')">
              <div>
                <div class="session-id">${s.id}</div>
                <div class="session-meta">
                  <span>${started}</span>
                  <span>${s.cwd || ''}</span>
                  <span>${s.model || ''}</span>
                </div>
              </div>
              <div>
                <span class="badge">${s.event_count} tools</span>
                <span class="badge">${status}</span>
              </div>
            </div>
          `;
        }).join('');
      } catch (e) {
        console.error('Failed to load sessions:', e);
      }
    }

    async function selectSession(id) {
      selectedSessionId = id;
      document.getElementById('events-panel').style.display = 'block';
      document.getElementById('selected-session-id').textContent = id;

      // Re-render session cards to update active state
      await loadSessions();
      await loadEvents(id);
    }

    async function loadEvents(sessionId) {
      try {
        const res = await fetch(`/api/events?session_id=${encodeURIComponent(sessionId)}`);
        const events = await res.json();
        const container = document.getElementById('events-list');

        if (events.length === 0) {
          container.innerHTML = '<div class="empty-state">No events for this session.</div>';
          return;
        }

        container.innerHTML = events.map(e => {
          const time = new Date(e.timestamp + 'Z').toLocaleTimeString();
          let detail = '';
          if (e.tool_name) detail += e.tool_name;
          if (e.tool_input) {
            try {
              const input = JSON.parse(e.tool_input);
              if (input && typeof input === 'object') {
                const preview = JSON.stringify(input).substring(0, 200);
                detail += detail ? ': ' + preview : preview;
              }
            } catch {}
          }
          if (e.decision) detail += (detail ? ' | ' : '') + e.decision;

          return `
            <div class="event-row">
              <span class="event-time">${time}</span>
              <span class="event-type ${e.hook_event_name}">${e.hook_event_name}</span>
              <span class="event-detail">${detail || '-'}</span>
            </div>
          `;
        }).join('');
      } catch (e) {
        console.error('Failed to load events:', e);
      }
    }

    async function refresh() {
      await loadSessions();
      if (selectedSessionId) {
        await loadEvents(selectedSessionId);
      }
    }

    loadSessions();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
